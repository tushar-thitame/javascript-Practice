<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Increment salary</title>
</head>
<body>
  <script>
     const obj = [
        {
          name: "tushar",
          exp: 1,
          salary: 20000,
        },
      {
          name: "siddhi",
          exp: 2,
          salary: 30000,
        },
        {
          name: "aditya",
          exp: 3,
          salary: 40000,
        },
      ];
      for (let i = 0; i < obj.length; i++) {
        if (obj[i].exp <= 1) {
          let final = obj[i].salary * 1.1;
          console.log(
            `${obj[i].name} experience increase by 10 % salary = ${final}`
          );
        } else if (obj[i].exp <= 2) {
          let final = obj[i].salary * 1.2;
          console.log(
            `${obj[i].name} experience increase by 20 % salary = ${final}`
          );
        } else if (obj[i].exp <= 3) {
          let final = obj[i].salary * 1.3;
          console.log(
            `${obj[i].name} experience increase by 30 % salary = ${final}`
          );
        }
      }
  </script>
</body>
</html>
